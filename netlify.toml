[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "22"

# Deploy previews on every PR — Netlify enables this by default when
# the repo is connected; this section makes the context explicit.
[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"

[[redirects]]
  from   = "/sitemap.xml"
  to     = "/sitemap-index.xml"
  status = 200

# ── Blog 301s: legacy Webflow slugs → new Astro slugs ──────────────────────
[[redirects]]
  from   = "/blog/an-sich-selber-arbeiten---bis-zum-status-gute-fahrerin-guter-fahrer"
  to     = "/blog/an-sich-selber-arbeiten/"
  status = 301
  force  = true

[[redirects]]
  from   = "/blog/haufige-fehler-in-der-fahrprufung---und-wie-du-sie-vermeidest"
  to     = "/blog/haufige-fehler-fahrpruefung/"
  status = 301
  force  = true

[[redirects]]
  from   = "/blog/5-tipps-wie-du-entspannt-durch-die-fuhrerprufung-kommst"
  to     = "/blog/5-tipps-fuehrerpruefung/"
  status = 301
  force  = true

# ── Legacy cross-locale slug 301s ───────────────────────────────────────────
# The pre-M10 site linked to naive prefix-swapped paths (e.g. /en/kontakt/,
# /about/) that 404'd because DE/EN slugs diverge. Redirect them to canonicals.
