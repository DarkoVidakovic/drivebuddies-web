# STAGED — enable in M10 by removing the `if: false` guard
# Crawls the built site and fails if any internal links are broken (4xx/5xx).

name: Broken Link Check

on:
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on the deployed site once live (adjust URL below)
    - cron: '0 6 * * 1'

jobs:
  broken-links:
    # if: false   # <- remove this line in M10 to activate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://drivebuddies.ch' }}

      - name: Serve built site
        run: npx serve dist &
        # Starts a local server on port 3000

      - name: Wait for server
        run: sleep 3

      - name: Check links
        uses: lycheeverse/lychee-action@v1
        with:
          args: >
            --base http://localhost:3000
            --exclude-all-private
            --exclude 'mailto:'
            --exclude 'tel:'
            --max-retries 3
            --timeout 20
            http://localhost:3000/
          fail: true
