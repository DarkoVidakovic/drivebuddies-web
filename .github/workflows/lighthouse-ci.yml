# STAGED — enable in M10 by removing the `if: false` guard and configuring LHCI
# Runs Lighthouse CI against the built site on every PR and enforces score budgets.

name: Lighthouse CI

on:
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    # if: false   # <- remove this line in M10 to activate
    runs-on: ubuntu-latest
    needs: []   # set to [build] and download artifact once astro-build.yml is active

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://drivebuddies.ch' }}

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

